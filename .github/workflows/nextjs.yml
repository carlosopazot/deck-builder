# Workflow for building and deploying a Next.js app to Vercel
# This app uses server-side API routes (auth, decks) which require a Node.js
# server and are incompatible with GitHub Pages static export.
#
# Required GitHub secrets:
#   VERCEL_TOKEN      - Vercel API token (from https://vercel.com/account/tokens)
#   VERCEL_ORG_ID     - Found in your Vercel project settings or .vercel/project.json
#   VERCEL_PROJECT_ID - Found in your Vercel project settings or .vercel/project.json
#
name: Deploy Next.js site to Vercel

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production
      - name: Build project artifacts
        run: vercel build --prod
      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod
